          sso_app_id: window.SSOPageConfig.app_id || 'NONE',
          u: uu
        });
      } catch (e) {
        window.collectEvent("config", {
          theme_id: window.SSOPageConfig.theme_id || 'unknown',
          theme_name: window.SSOPageConfig.theme_name || 'unknown',
          sso_app_id: window.SSOPageConfig.app_id || 'NONE',
        });
      }
    }
    window.collectEvent("start");
  </script>
